networks:
  training-net:
    external: true

services:
  node0:
    build: .
    container_name: node0
    hostname: node0
    networks:
      - training-net
    volumes:
      - ./training:/workspace/training
      - ./results:/workspace/results
      - ./data:/workspace/data
    environment:
      - MASTER_ADDR=node0
      - MASTER_PORT=29500
      - WORLD_SIZE=3
      - RANK=0
    tty: true
    stdin_open: true

  node1:
    build: .
    container_name: node1
    hostname: node1
    networks:
      - training-net
    volumes:
      - ./training:/workspace/training
      - ./results:/workspace/results
      - ./data:/workspace/data
    environment:
      - MASTER_ADDR=node0
      - MASTER_PORT=29500
      - WORLD_SIZE=3
      - RANK=1
    tty: true
    stdin_open: true

  node2:
    build: .
    container_name: node2
    hostname: node2
    networks:
      - training-net
    volumes:
      - ./training:/workspace/training
      - ./results:/workspace/results
      - ./data:/workspace/data
    environment:
      - MASTER_ADDR=node0
      - MASTER_PORT=29500
      - WORLD_SIZE=3
      - RANK=2
    tty: true
    stdin_open: true

  dashboard:
    build: .
    container_name: dashboard
    hostname: dashboard
    networks:
      - training-net
    volumes:
      - ./dashboard:/workspace/dashboard
      - ./data:/workspace/data
    ports:
      - "5050:5000"
    tty: true
    stdin_open: true

  telemetry:
    build: .
    container_name: telemetry
    hostname: telemetry
    networks:
      - training-net
    volumes:
      - ./telemetry:/workspace/telemetry
      - ./data:/workspace/data
      - /var/run/docker.sock:/var/run/docker.sock
    tty: true
    stdin_open: true
